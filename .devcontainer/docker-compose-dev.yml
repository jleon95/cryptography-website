version: '3.8'

services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/typescript-node:4-20-bullseye
    container_name: cryptography-devcontainer
    volumes:
      - ..:/workspaces/cryptography-website
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../server/.env.development
    networks:
      - web
    environment:
      DATABASE_URL: postgresql://cryptographyDevUser:notTheActualProductionPassword@postgres-dev:5432/cryptographyDev?schema=public
    depends_on:
      postgres-dev:
        condition: service_healthy
    command: /bin/sh -c "while sleep 1000; do :; done"

  postgres-dev:
    container_name: postgres-dev
    image: postgres:latest
    restart: always
    expose:
      - 5432
    environment:
      POSTGRES_USER: 'cryptographyDevUser'
      POSTGRES_PASSWORD: 'notTheActualProductionPassword'
      POSTGRES_DB: 'cryptographyDev'
    volumes:
      - ../postgres-data:/var/lib/postgresql
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d cryptographyDev -U cryptographyDevUser"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  web:
    name: web-dev
